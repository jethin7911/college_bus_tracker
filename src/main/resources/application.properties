spring.application.name=college_bus_tracker
server.port=${PORT:8080}

# Use environment variables ? Railway injects these
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# Enable detailed logging to see the "CREATE TABLE" commands in Railway logs
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

spring.websocket.message-size-limit=64KB
